name: 週次サロンレポート自動送信

on:
  # 毎週月曜日 午前9時（JST = UTC+9）に実行
  schedule:
    - cron: '0 0 * * 1'
  
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Slack送信しない)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-and-post-report:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 週次レポートを生成
        run: |
          echo "📊 週次レポートを生成しています..."
          node scripts/generate-weekly-report.js
          echo "✅ レポート生成完了"

      - name: レポート内容を確認
        run: |
          echo "=== レポートプレビュー ==="
          cat weekly-report.txt

      - name: Slackに送信
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "📤 Slackに送信しています..."
          node scripts/post-slack.js
          echo "✅ 送信完了"

      - name: ドライランメッセージ
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "🔍 ドライランモード: Slackには送信しませんでした"
          echo "レポートファイル: weekly-report.txt"
